<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <title>Viora | Smart Olive Management</title>

    <link rel="icon" type="image/png" href="./assets/logos/viora-icon-ico.ico" />
    <link rel="apple-touch-icon" href="./assets/logos/viora-icon-ico.ico" />

    <meta name="description" content="Viora empowers olive growers and agronomic experts with climate intelligence, satellite insights and early phytosanitary alerts." />

    <link rel="stylesheet" href="./css/main.css" />
</head>

<body>
<main class="landing-page">
    <header class="landing-header" data-i18n-aria="aria.mainNavigation">
        <div class="landing-header__container">
            <a class="landing-header__brand" href="#home" data-i18n-aria="aria.goHome" data-hover-sound>
                <img class="landing-header__logo" src="./assets/logos/viora-isologotipo-white.png" alt="Viora logo" />
            </a>

            <nav class="landing-header__nav liquid-glass liquid-glass--deep" data-i18n-aria="aria.landingSections">
                <a class="landing-header__nav-link landing-header__nav-link--active" href="#home" data-hover-sound>
                    <img class="landing-header__nav-icon" src="./assets/icons/home-outline.svg" alt="" aria-hidden="true" />
                    <span data-i18n="navbar.home"></span>
                </a>

                <a class="landing-header__nav-link" href="#features" data-hover-sound>
                    <img class="landing-header__nav-icon" src="./assets/icons/diamond-outline.svg" alt="" aria-hidden="true" />
                    <span data-i18n="navbar.features"></span>
                </a>

                <a class="landing-header__nav-link" href="#growers" data-hover-sound>
                    <img class="landing-header__nav-icon" src="./assets/icons/disc-outline.svg" alt="" aria-hidden="true" />
                    <span data-i18n="navbar.growers"></span>
                </a>

                <a class="landing-header__nav-link" href="#specialists" data-hover-sound>
                    <img class="landing-header__nav-icon" src="./assets/icons/disc-outline.svg" alt="" aria-hidden="true" />
                    <span data-i18n="navbar.specialists"></span>
                </a>

                <a class="landing-header__nav-link" href="#pricing" data-hover-sound>
                    <img class="landing-header__nav-icon" src="./assets/icons/ticket-outline.svg" alt="" aria-hidden="true" />
                    <span data-i18n="navbar.pricing"></span>
                </a>

                <a class="landing-header__nav-link" href="#about" data-hover-sound>
                    <img class="landing-header__nav-icon" src="./assets/icons/medical-outline.svg" alt="" aria-hidden="true" />
                    <span data-i18n="navbar.aboutUs"></span>
                </a>


            </nav>

            <div class="landing-header__actions">
                <div class="landing-header__language-switcher liquid-glass liquid-glass--deep" data-language-switcher data-liquid-glass>
                    <button class="landing-header__language-btn" type="button" data-lang-switch="en" data-hover-sound>EN</button>
                    <button class="landing-header__language-btn" type="button" data-lang-switch="es" data-hover-sound>ES</button>
                    <div class="landing-header__language-slider"></div>
                </div>

                <span class="magnetic-target" data-magnetic data-magnetic-strength="1" data-magnetic-max="14" data-hover-sound>
                        <a class="landing-header__cta" href="https://viora-webapp.web.app" data-i18n="navbar.getStarted"></a>
                    </span>
            </div>

            <!-- Mobile: language toggle + hamburger -->
            <div class="landing-header__mobile-actions">
                <div class="landing-header__language-switcher liquid-glass liquid-glass--deep" data-language-switcher data-liquid-glass>
                    <button class="landing-header__language-btn" type="button" data-lang-switch="en" data-hover-sound>EN</button>
                    <button class="landing-header__language-btn" type="button" data-lang-switch="es" data-hover-sound>ES</button>
                    <div class="landing-header__language-slider"></div>
                </div>

                <span class="magnetic-target landing-header__hamburger-magnetic" data-magnetic data-magnetic-strength="1" data-magnetic-max="20">
                        <button class="landing-header__hamburger liquid-glass liquid-glass--deep" type="button" data-i18n-aria-label="aria.mobileNav" aria-expanded="false" data-drawer-toggle data-liquid-glass data-hover-sound>
                            <span class="landing-header__hamburger-bar"></span>
                            <span class="landing-header__hamburger-bar"></span>
                        </button>
                    </span>
            </div>
        </div>

        <!-- Mobile Drawer (right → left) -->
        <div class="landing-header__drawer-backdrop" data-drawer-backdrop></div>

        <aside class="landing-header__drawer" data-drawer data-i18n-aria-label="aria.mobileNav">
            <!-- Close button -->
            <span class="magnetic-target" data-magnetic data-magnetic-strength="1" data-magnetic-max="18">
                    <button class="landing-header__drawer-close liquid-glass liquid-glass--deep" type="button" data-i18n-aria-label="aria.closeMenu" data-drawer-close data-liquid-glass data-hover-sound>
                        <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
                            <path d="M2 2L14 14M14 2L2 14" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
                        </svg>
                    </button>
                </span>

            <!-- Big links -->
            <nav class="landing-header__drawer-big-links">
                <a href="#home" data-drawer-link data-hover-sound data-i18n="navbar.home"></a>
                <a href="#features" data-drawer-link data-hover-sound data-i18n="navbar.features"></a>
                <a href="#growers" data-drawer-link data-hover-sound data-i18n="navbar.growers"></a>
                <a href="#specialists" data-drawer-link data-hover-sound data-i18n="navbar.specialists"></a>
                <a href="#pricing" data-drawer-link data-hover-sound data-i18n="navbar.pricing"></a>
            </nav>

            <!-- Small links -->
            <nav class="landing-header__drawer-small-links">
                <a href="#about" data-drawer-link data-hover-sound data-i18n="navbar.aboutUs"></a>

            </nav>

            <!-- CTA -->
            <div class="landing-header__drawer-cta">
                    <span class="magnetic-target" data-magnetic data-magnetic-strength="1" data-magnetic-max="14">
                        <a class="landing-button landing-button--green liquid-glass liquid-glass--green" href="https://viora-webapp.web.app" data-drawer-link data-liquid-glass data-hover-sound data-i18n="navbar.getStarted"></a>
                    </span>
            </div>
        </aside>
    </header>

    <section class="hero-section" id="home" aria-labelledby="hero-title">
        <div class="hero-section__background" data-hero-background></div>
        <div class="hero-section__layer" aria-hidden="true"></div>

        <div class="hero-section__content">
            <h1 class="hero-section__title" id="hero-title" data-i18n="hero.title"></h1>

            <p class="hero-section__subtitle" data-i18n="hero.subtitle"></p>

            <div class="hero-section__actions" data-i18n-aria="aria.heroActions">
                <landing-button variant="secondary" href="https://viora-webapp.web.app" i18n-key="hero.cta" liquid-glass-color="green" magnetic-max="14"></landing-button>
            </div>
        </div>

        <div class="hero-section__meta">
            <span class="hero-section__site-credit" data-i18n="hero.siteCredit"></span>

            <div class="hero-section__meta-actions">
                    <span class="magnetic-target" data-magnetic data-magnetic-strength="0.3" data-magnetic-max="10">
                        <button class="hero-section__sound-button" type="button" data-sound-toggle data-hover-sound
                                data-i18n-aria-label="aria.soundToggle" aria-pressed="false">
                            <svg class="hero-section__sound-icon" width="24" height="10" viewBox="0 0 24 10" overflow="hidden"
                                 fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                                <g class="hero-section__animated-wave" data-sound-wave-animated hidden>
                                    <path d="M0 5 Q 3 0 6 5 T 12 5 T 18 5 T 24 5 T 30 5 T 36 5" />
                                </g>

                                <g data-sound-wave-flat>
                                    <path d="M0 5 L 24 5" />
                                </g>
                            </svg>

                            <span data-i18n="hero.sound"></span>
                        </button>
                    </span>
            </div>
        </div>
    </section>

    <span class="magnetic-target floating-sound-toggle-wrap" data-magnetic data-magnetic-strength="1" data-magnetic-max="12" data-floating-sound-toggle-wrap>
            <button class="floating-sound-toggle liquid-glass liquid-glass--green" type="button" data-sound-toggle data-floating-sound-toggle data-liquid-glass data-hover-sound
                    data-i18n-aria-label="aria.soundToggle" aria-pressed="false">
                <svg class="floating-sound-toggle__icon" width="24" height="10" viewBox="0 0 24 10" overflow="hidden"
                     fill="none" stroke="currentColor" stroke-width="1.5" aria-hidden="true">
                    <g class="hero-section__animated-wave" data-sound-wave-animated hidden>
                        <path d="M0 5 Q 3 0 6 5 T 12 5 T 18 5 T 24 5 T 30 5 T 36 5" />
                    </g>

                    <g data-sound-wave-flat>
                        <path d="M0 5 L 24 5" />
                    </g>
                </svg>

                <span data-i18n="hero.sound"></span>
            </button>
        </span>

    <section class="about-intro-section" id="about-intro" data-wave-scroll aria-labelledby="about-intro-title">
        <div class="about-intro-section__wave" aria-hidden="true"></div>
        <div class="about-intro-section__glow" aria-hidden="true"></div>

        <div class="about-intro-section__container">
            <p class="about-intro-section__eyebrow" data-i18n="aboutIntro.eyebrow"></p>

            <h2 class="about-intro-section__title" id="about-intro-title" data-i18n="aboutIntro.title"></h2>
        </div>

        <div class="about-intro-section__marquee" aria-label="Viora value keywords" data-infinite-marquee>
            <div class="about-intro-section__marquee-track">
                <div class="about-intro-section__marquee-content">
                    <span data-i18n="aboutIntro.marquee.satellite"></span>
                    <span class="about-intro-section__marquee-separator"></span>
                    <span data-i18n="aboutIntro.marquee.farming"></span>
                    <span class="about-intro-section__marquee-separator"></span>
                    <span data-i18n="aboutIntro.marquee.grow"></span>
                    <span class="about-intro-section__marquee-separator"></span>
                </div>

                <div class="about-intro-section__marquee-content" aria-hidden="true">
                    <span data-i18n="aboutIntro.marquee.satellite"></span>
                    <span class="about-intro-section__marquee-separator"></span>
                    <span data-i18n="aboutIntro.marquee.farming"></span>
                    <span class="about-intro-section__marquee-separator"></span>
                    <span data-i18n="aboutIntro.marquee.grow"></span>
                    <span class="about-intro-section__marquee-separator"></span>
                </div>
            </div>
        </div>
    </section>

    <section class="problem-cards-section" id="problem-cards" aria-labelledby="problem-cards-title">
        <div class="problem-cards-section__container">
            <div class="problem-cards-section__topline" id="features">
                <span class="problem-cards-section__section-label" data-i18n="problemCards.sectionLabel"></span>
            </div>

            <div class="problem-cards-section__layout">
                <div class="problem-cards-section__content">
                    <p class="problem-cards-section__tag" data-i18n="problemCards.tag"></p>

                    <h2 class="problem-cards-section__title" id="problem-cards-title" data-i18n="problemCards.title"></h2>

                    <p class="problem-cards-section__description" data-i18n="problemCards.description"></p>

                    <div class="problem-cards-section__actions">
                        <landing-button variant="secondary" href="#solution" i18n-key="problemCards.cta" liquid-glass-color="green" magnetic-max="14"></landing-button>

                        <landing-button variant="secondary" href="#solution" liquid-glass-color="green" is-icon icon-src="./assets/icons/checkmark.svg" i18n-key="problemCards.ctaAria" magnetic-max="14"></landing-button>
                    </div>
                </div>

                <div class="problem-cards-section__cards" data-i18n-aria-label="aria.problemCards">
                    <div class="problem-cards-section__cards-title">
                        <span data-i18n="problemCards.cardsTitle"></span>
                        <span aria-hidden="true">
                                <img src="./assets/icons/arrow-down.svg" alt="" />
                            </span>
                    </div>

                    <div class="problem-cards-section__accordion" data-problem-cards-accordion>
                        <article class="problem-card problem-card--active" data-problem-card>
                            <button class="problem-card__trigger" type="button" aria-expanded="true" data-problem-card-trigger>
                                <span data-i18n="problemCards.cards.yields.title"></span>
                            </button>

                            <div class="problem-card__body" data-problem-card-body>
                                <div class="problem-card__number" data-i18n="problemCards.cards.yields.number"></div>

                                <div class="problem-card__line"></div>

                                <p class="problem-card__text" data-i18n="problemCards.cards.yields.description"></p>
                            </div>
                        </article>

                        <article class="problem-card" data-problem-card>
                            <button class="problem-card__trigger" type="button" aria-expanded="false" data-problem-card-trigger>
                                <span data-i18n="problemCards.cards.pests.title"></span>
                            </button>

                            <div class="problem-card__body" data-problem-card-body>
                                <div class="problem-card__number" data-i18n="problemCards.cards.pests.number"></div>

                                <div class="problem-card__line"></div>

                                <p class="problem-card__text" data-i18n="problemCards.cards.pests.description"></p>
                            </div>
                        </article>

                        <article class="problem-card" data-problem-card>
                            <button class="problem-card__trigger" type="button" aria-expanded="false" data-problem-card-trigger>
                                <span data-i18n="problemCards.cards.climate.title"></span>
                            </button>

                            <div class="problem-card__body" data-problem-card-body>
                                <div class="problem-card__number" data-i18n="problemCards.cards.climate.number"></div>

                                <div class="problem-card__line"></div>

                                <p class="problem-card__text" data-i18n="problemCards.cards.climate.description"></p>
                            </div>
                        </article>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section class="problem-solution-section" id="solution" data-i18n-aria-label="aria.problemSolution">
        <section class="problem-panel" data-video-expand-section aria-labelledby="problem-panel-title">
            <div class="problem-panel__sticky" data-video-expand-sticky>
                <div class="problem-panel__intro-layout">
                    <div class="problem-panel__intro-content">
                        <h2 class="problem-panel__intro-text" id="problem-panel-title" data-i18n="problemSolution.problemPanel.introText"></h2>
                    </div>

                    <div class="problem-panel__media-placeholder" data-video-expand-placeholder></div>
                </div>

                <figure class="problem-panel__media" data-video-expand-media>
                    <video class="problem-panel__video" src="./assets/videos/problem-panel-field-risk.mp4" muted autoplay loop playsinline></video>

                    <figcaption class="problem-panel__caption" data-video-expand-caption>
                        <div class="problem-panel__caption-line"></div>

                        <p class="problem-panel__caption-text" data-i18n="problemSolution.problemPanel.expandedText"></p>
                    </figcaption>
                </figure>
            </div>
        </section>

        <section class="solution-panel" id="solution-panel" aria-labelledby="solution-panel-title">
            <div class="solution-panel__header">
                <p class="solution-panel__eyebrow" data-i18n="solutionPanel.eyebrow"></p>

                <h2 class="solution-panel__title" id="solution-panel-title" data-i18n="solutionPanel.title"></h2>

                <p class="solution-panel__subtitle" data-i18n="solutionPanel.subtitle"></p>
            </div>

            <div class="solution-panel__carousel" data-solution-carousel data-i18n-aria-label="aria.solutionCarousel">
                <div class="solution-panel__track" data-solution-track>
                    <article class="solution-card" data-solution-card tabindex="0">
                        <h3 class="solution-card__title" data-i18n="solutionPanel.cards.alerts.title"></h3>

                        <div class="solution-card__icon" aria-hidden="true">
                            <img src="./assets/icons/icons-cards/new/bug.png" alt="" class="solution-card__icon-img" />
                            <img src="./assets/icons/icons-cards/new/bug_white.png" alt="" class="solution-card__icon-img--white" />
                        </div>

                        <p class="solution-card__description" data-i18n="solutionPanel.cards.alerts.description"></p>
                    </article>

                    <article class="solution-card" data-solution-card tabindex="0">
                        <h3 class="solution-card__title" data-i18n="solutionPanel.cards.marketplace.title"></h3>

                        <div class="solution-card__icon" aria-hidden="true">
                            <img src="./assets/icons/icons-cards/new/bag.png" alt="" class="solution-card__icon-img" />
                            <img src="./assets/icons/icons-cards/new/bag_white.png" alt="" class="solution-card__icon-img--white" />
                        </div>

                        <p class="solution-card__description" data-i18n="solutionPanel.cards.marketplace.description"></p>
                    </article>

                    <article class="solution-card solution-card--active" data-solution-card tabindex="0">
                        <h3 class="solution-card__title" data-i18n="solutionPanel.cards.ndvi.title"></h3>

                        <div class="solution-card__icon" aria-hidden="true">
                            <img src="./assets/icons/icons-cards/new/satelite.png" alt="" class="solution-card__icon-img" />
                            <img src="./assets/icons/icons-cards/new/satelite_white.png" alt="" class="solution-card__icon-img--white" />
                        </div>

                        <p class="solution-card__description" data-i18n="solutionPanel.cards.ndvi.description"></p>
                    </article>

                    <article class="solution-card" data-solution-card tabindex="0">
                        <h3 class="solution-card__title" data-i18n="solutionPanel.cards.chill.title"></h3>

                        <div class="solution-card__icon" aria-hidden="true">
                            <img src="./assets/icons/icons-cards/new/cold-olive.png" alt="" class="solution-card__icon-img" />
                            <img src="./assets/icons/icons-cards/new/cold-olive_white.png" alt="" class="solution-card__icon-img--white" />
                        </div>

                        <p class="solution-card__description" data-i18n="solutionPanel.cards.chill.description"></p>
                    </article>

                    <article class="solution-card" data-solution-card tabindex="0">
                        <h3 class="solution-card__title" data-i18n="solutionPanel.cards.nutrition.title"></h3>

                        <div class="solution-card__icon" aria-hidden="true">
                            <img src="./assets/icons/icons-cards/new/olive.png" alt="" class="solution-card__icon-img" />
                            <img src="./assets/icons/icons-cards/new/olive_white.png" alt="" class="solution-card__icon-img--white" />
                        </div>

                        <p class="solution-card__description" data-i18n="solutionPanel.cards.nutrition.description"></p>
                    </article>

                    <article class="solution-card" data-solution-card tabindex="0">
                        <h3 class="solution-card__title" data-i18n="solutionPanel.cards.climate.title"></h3>

                        <div class="solution-card__icon" aria-hidden="true">
                            <img src="./assets/icons/icons-cards/new/stats.png" alt="" class="solution-card__icon-img" />
                            <img src="./assets/icons/icons-cards/new/stats_white.png" alt="" class="solution-card__icon-img--white" />
                        </div>

                        <p class="solution-card__description" data-i18n="solutionPanel.cards.climate.description"></p>
                    </article>
                </div>
            </div>

            <div class="solution-panel__controls" aria-label="Solution carousel controls">
                    <span class="magnetic-target" data-magnetic data-magnetic-strength="1" data-magnetic-max="16">
                        <button class="solution-panel__control" type="button" data-solution-prev data-hover-sound data-i18n-aria-label="aria.prevSolution">
                            ←
                        </button>
                    </span>

                <span class="magnetic-target" data-magnetic data-magnetic-strength="1" data-magnetic-max="16">
                        <button class="solution-panel__control" type="button" data-solution-next data-hover-sound data-i18n-aria-label="aria.nextSolution">
                            →
                        </button>
                    </span>
            </div>
        </section>

        <section class="expected-outcomes-panel" id="expected-outcomes" data-outcomes-parallax-section aria-labelledby="expected-outcomes-title">
            <div class="expected-outcomes-panel__grid">
                <div class="expected-outcomes-panel__media expected-outcomes-panel__media--top">
                    <video class="expected-outcomes-panel__video" src="./assets/videos/outcomes-grower-field.mp4" poster="./assets/images/problem-solution/outcomes-grower-field-poster.webp" muted autoplay loop playsinline data-outcomes-parallax-video></video>
                </div>

                <div class="expected-outcomes-panel__content expected-outcomes-panel__content--metrics">
                    <p class="expected-outcomes-panel__eyebrow" data-i18n="expectedOutcomes.eyebrow"></p>

                    <h2 class="expected-outcomes-panel__title" id="expected-outcomes-title" data-i18n="expectedOutcomes.title"></h2>

                    <div class="expected-outcomes-panel__dotted-line" aria-hidden="true"></div>

                    <div class="expected-outcomes-panel__metrics">
                        <div class="expected-outcomes-panel__metric">
                            <strong class="expected-outcomes-panel__metric-value" data-i18n="expectedOutcomes.metrics.delivery.value"></strong>
                            <span class="expected-outcomes-panel__metric-label" data-i18n="expectedOutcomes.metrics.delivery.label"></span>
                        </div>

                        <div class="expected-outcomes-panel__metric">
                            <strong class="expected-outcomes-panel__metric-value" data-i18n="expectedOutcomes.metrics.growers.value"></strong>
                            <span class="expected-outcomes-panel__metric-label" data-i18n="expectedOutcomes.metrics.growers.label"></span>
                        </div>

                        <div class="expected-outcomes-panel__metric">
                            <strong class="expected-outcomes-panel__metric-value" data-i18n="expectedOutcomes.metrics.specialists.value"></strong>
                            <span class="expected-outcomes-panel__metric-label" data-i18n="expectedOutcomes.metrics.specialists.label"></span>
                        </div>

                        <div class="expected-outcomes-panel__metric">
                            <strong class="expected-outcomes-panel__metric-value" data-i18n="expectedOutcomes.metrics.reduction.value"></strong>
                            <span class="expected-outcomes-panel__metric-label" data-i18n="expectedOutcomes.metrics.reduction.label"></span>
                        </div>
                    </div>
                </div>

                <div class="expected-outcomes-panel__content expected-outcomes-panel__content--recommendation">
                    <p class="expected-outcomes-panel__eyebrow" data-i18n="expectedOutcomes.recommendation.eyebrow"></p>

                    <h3 class="expected-outcomes-panel__recommendation-title" data-i18n="expectedOutcomes.recommendation.title"></h3>

                    <div class="expected-outcomes-panel__dotted-line" aria-hidden="true"></div>

                    <p class="expected-outcomes-panel__recommendation-text" data-i18n="expectedOutcomes.recommendation.description"></p>

                    <landing-button variant="green" href="https://viora-webapp.web.app" i18n-key="expectedOutcomes.recommendation.cta" magnetic-max="16"></landing-button>
                </div>

                <div class="expected-outcomes-panel__media expected-outcomes-panel__media--bottom">
                    <video class="expected-outcomes-panel__video" src="./assets/videos/outcomes-field-treatment.mp4" poster="./assets/images/problem-solution/outcomes-field-treatment-poster.webp" muted autoplay loop playsinline data-outcomes-parallax-video></video>
                </div>
            </div>
        </section>
    </section>

    <section class="segments-overview" aria-labelledby="segments-overview-title">
        <div class="segments-overview__topline">
            <span class="segments-overview__section-label" data-i18n="roleBenefits.sectionLabel"></span>
        </div>

        <div class="segments-overview__intro">
            <h2 class="segments-overview__title" id="segments-overview-title" data-i18n="roleBenefits.title"></h2>
            <p class="segments-overview__description" data-i18n="roleBenefits.description"></p>
        </div>

        <nav class="segments-overview__nav" data-i18n-aria-label="roleBenefits.navAria">
            <a class="segments-overview__arrow segments-overview__arrow--prev" href="#growers" data-i18n-aria-label="roleBenefits.growersLinkAria" data-magnetic data-magnetic-strength="1" data-magnetic-max="14" data-hover-sound>
